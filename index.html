<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Frontend Mentor Header</title>

<style>
  :root{
    --text:#111827;
    --muted:#6b7280;
    --badge:#3157b6;
    --border:#e5e7eb;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;
    color:var(--text);
  }

  /* ===== HEADER ===== */
  .topbar{
    height:70px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    gap:20px;
    padding:0 16px;
  }

  /* Logo */
  .brand{
    display:flex;
    align-items:center;
    gap:16px;
    min-width:230px;
  }
  .brand-logo{
    height:32px;
  }

  /* Right nav */
  .nav-right{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .nav-btn{
    appearance:none;
    border:0;
    background:none;
    cursor:pointer;
    padding:10px 12px;
    border-radius:8px;
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:700;
    color:var(--text);
  }
  .nav-btn:hover{ background:#f7f7f7; }

  .chev{
    width:14px;
    height:14px;
    color:var(--muted);
  }

  .badge{
    background:var(--badge);
    color:#fff;
    padding:4px 10px;
    font-size:12px;
    border-radius:8px;
    font-weight:700;
  }

  /* Icon buttons */
  .icon-btn{
    width:40px;height:40px;
    display:flex;align-items:center;justify-content:center;
    border-radius:8px;
  }
  .icon-btn:hover{ background:#f3f3f3; }

  .avatar{
    width:36px;height:36px;
    border-radius:50%;
    background:#f3f4f6;
    display:flex;align-items:center;justify-content:center;
    font-weight:800;
    color:#d33dde;
  }
</style>
</head>

<body>
<header class="topbar">

  <!-- Logo dùng ảnh thật -->
  <div class="brand">
    <img class="brand-logo" src="https://www.frontendmentor.io/images/logo-desktop.svg" alt="Frontend Mentor logo">
  </div>

  <!-- Right Menu -->
  <nav class="nav-right">
    <!-- Explore -->
    <button class="nav-btn">
      EXPLORE
      <svg class="chev" viewBox="0 0 24 24" fill="currentColor">
        <path d="M7 10l5 5 5-5H7z"></path>
      </svg>
    </button>

    <!-- For Companies -->
    <button class="nav-btn">
      FOR COMPANIES
      <svg class="chev" viewBox="0 0 24 24" fill="currentColor">
        <path d="M7 10l5 5 5-5H7z"></path>
      </svg>
    </button>

    <!-- Unlock -->
    <button class="nav-btn">
      MỞ KHÓA
      <span class="badge">CHUYÊN NGHIỆP</span>
    </button>

    <!-- Bell -->
    #
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#111827">
        <path d="M12 22a2.5 2.5 0 0 0 2.45-2H9.55A2.5 2.5 0 0 0 12 22Zm7-6V11a7 7 0 0 0-14 0v5l-2 2v1h18v-1l-2-2Z" />
      </svg>
    </a>

    <!-- Bag -->
    #
      <svg width="22" height="22" viewBox="0 0 24 24" stroke="#111827" fill="none" stroke-width="2">
        <path d="M6 6h14l-2 9H8L6 6Zm-1 0H3" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="9" cy="20" r="1.7" fill="#111827"/>
        <circle cx="17" cy="20" r="1.7" fill="#111827"/>
      </svg>
    </a>

    <!-- Avatar -->
    <span class="avatar">PQ</span>

    <!-- Chevron cuối -->
    #
      <svg width="18" height="18" viewBox="0 0 24 24" stroke="#111827" fill="none" stroke-width="2">
        <path d="M8 10l4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </nav>
</header>
</body>
</html>
